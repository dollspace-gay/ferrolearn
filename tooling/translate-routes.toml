# translate-routes.toml — read-gate route table (ferrolearn <- scikit-learn 1.5.2)
#
# Consumed by tooling/translate-discipline.py to gate Edit/Write on
# ferrolearn-* crate src/ files. Each [[route]] declares:
#
#   crate_pattern : repo-relative target file (exact or glob).
#   upstream      : scikit-learn source paths under /home/doll/scikit-learn/
#                   (clone pinned to tag 1.5.2, commit 156ef14; this matches
#                   the installed `sklearn` 1.5.2 used as the live oracle).
#                   At least ONE must be Read before the edit.
#   design        : .design/<area>/<doc>.md governing this translation.
#                   MUST exist on disk; if missing, the hook blocks with
#                   acto-doc-author dispatch instructions.
#   parity_ops    : estimator / function families this file owns
#                   (informational — verification is cargo-test + the live
#                   sklearn oracle for library crates, pytest-vs-sklearn for
#                   ferrolearn-python; see goal.md "The verification model").
#
# Every gated edit also requires a Read of goal.md in the same session.
# Files under a ferrolearn-* crate's src/ without a route are BLOCKED
# (R-XLATE-2): that block is the ratchet — when the loop reaches a new
# translation unit, its first action is to add the route here.
#
# This seed covers the dependency-ordered priority crates (core -> linear
# -> tree -> neighbors -> bayes -> cluster -> preprocess -> metrics ->
# decomp). Remaining crates (model-sel, kernel, numerical, covariance,
# neural, sparse, datasets, io, fetch, and ferrolearn-python) get routes
# added as the loop reaches them.

# =====================================================================
# Layer 0 — ferrolearn-core (leaf: traits, dataset, errors, pipeline)
# =====================================================================

[[route]]
crate_pattern = "ferrolearn-core/src/traits.rs"
upstream = ["/home/doll/scikit-learn/sklearn/base.py"]
design = ".design/core/traits.md"
